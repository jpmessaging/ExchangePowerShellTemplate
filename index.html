<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Exchange PowerShell Template</title>

    <link rel="stylesheet" href="styles.css">

</head>

<body>
    <div class="layout">
        <div class="left-panel">
            <h2>変数定義</h2>

            <table id="targetTable" border="1" cellpadding="5">
                <thead>
                    <tr>
                        <th>変数名</th>
                        <th>値 (メール アドレス)</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td><input class="target-var-name" value="User1" onchange="handleVarNameInput(this)"></td>
                        <td><input class="target-var-value" value="事象発生ユーザーのメール アドレス"></td>
                        <td><button type="button" onclick="removeTarget(this)">削除</button></td>
                    </tr>
                </tbody>
            </table>

            <br>
            <button onclick="addTarget()">追加</button>

            <h2>コマンド</h2>
            <div class="section">
                <div class="commands-toolbar">
                    <div class="commands-toolbar-row">
                        <input id="commandSearch" class="command-search" type="text" placeholder="コマンドを検索" oninput="handleCommandSearchInput(this)">
                        <button type="button" class="toolbar-button" onclick="clearCommandSearch()">検索クリア</button>
                        <button type="button" class="toolbar-button" onclick="resetCommandSelections()">チェックをリセット</button>
                    </div>
                    <div class="commands-toolbar-row">
                        <button id="filterChip_exo" type="button" class="filter-chip" onclick="toggleCommandFilter('exo')" aria-pressed="false">EXO</button>
                        <button id="filterChip_onprem" type="button" class="filter-chip" onclick="toggleCommandFilter('onprem')" aria-pressed="false">ONPREM</button>
                        <button id="filterChip_graph" type="button" class="filter-chip" onclick="toggleCommandFilter('graph')" aria-pressed="false">GRAPH</button>
                    </div>
                    <div class="commands-toolbar-row">
                        <div class="tag-chip-wrap">
                            <span class="tag-chip-label">Tag:</span>
                            <div id="tagFilterChips" class="tag-chip-wrap"></div>
                        </div>
                        <span id="commandSummary" class="command-summary">表示 0 / 全 0</span>
                    </div>
                </div>
            </div>
            <div id="commands" class="section"></div>
            <div id="commandNoResults" class="command-no-results" hidden>条件に一致するコマンドがありません。</div>
        </div>

        <div class="right-panel">
            <h2>オプション</h2>
            <div class="section">
                <div class="option-item">
                    <label>
                        <input id="keepVarNameInFileName" type="checkbox" checked>
                        ファイル名に変数を含める
                    </label>
                    <div class="option-sub">
                        <label>
                            <input id="expandVarNameInFileName" type="checkbox">
                            変数を展開する
                        </label>
                    </div>
                    <div class="option-note">有効: Mailbox_user1@contoso.com.xml</div>
                    <div class="option-note">無効: Mailbox_User1.xml</div>
                </div>
                <div class="option-item">
                    <div class="option-inline">
                        <label>
                            <input id="includeGuidanceText" type="checkbox" checked>
                            ご案内文言例を含める
                        </label>
                        <select id="guidanceType">
                            <option value="exo" selected>Exchange Online</option>
                            <option value="exoSimple">Exchange Online (Simple)</option>
                            <option value="graph">Microsoft Graph</option>
                            <option value="onprem">On-premises</option>
                            <option value="onpremSimple">On-premises (Simple)</option>
                        </select>
                    </div>
                    <div class="option-sub">
                        <div class="option-sub">
                            <label>
                                <input id="includeTranscript" type="checkbox">
                                トランスクリプトを含める
                            </label>
                        </div>
                        <div class="option-item">
                            <div class="option-sub">
                                <label>
                                    <input id="exportToDesktop" type="checkbox" onchange="toggleExportPathInput()" checked>
                                    デスクトップに出力する
                                </label>
                            </div>
                            <div class="option-sub option-sub-deeper">
                                <input id="exportPath" class="option-path-input" value="C:\temp" oninput="handleExportPathInput(this)">
                            </div>
                        </div>
                    </div>
                    <div class="option-inline">
                        <label>
                            <input id="premiseSuffix" type="checkbox">
                            ファイル名に ExO / Onprem サフィックス含める
                        </label>
                    </div>
                    <div class="option-note">Mailbox_User1_ExO.xml</div>
                    <div class="option-note">Mailbox_User1_Onprem.xml</div>
                </div>
            </div>

            <h2>出力</h2>
            <div class="output-actions">
                <button onclick="generate()">生成する</button>
                <button onclick="copy()">コピー</button>
            </div>
            <textarea id="output" class="output-textarea" spellcheck="false"></textarea>
        </div>
    </div>

    <script src="app.js"></script>

</body>

</html>
